services:
  postgres:
    image: postgres:16-alpine
    container_name: snaploop-postgres
    environment:
      POSTGRES_USER: snaploop
      POSTGRES_PASSWORD: snaploop
      POSTGRES_DB: snaploop
    ports:
      # Host 5433 -> container 5432 (5432 was already in use on this machine)
      - "5433:5432"
    volumes:
      - snaploop_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snaploop"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: snaploop-redis
    ports:
      # Host 6380 -> container 6379 (6379 was already in use on this machine)
      - "6380:6379"
    volumes:
      - snaploop_redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  snaploop_pgdata:
  snaploop_redisdata:
